<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加载中... | boring_student</title>
    <meta name="color-scheme" content="light dark">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <meta name="theme-color" content="#0d6efd">
    <style>
        :root {
            --bg: #ffffff;
            --text: #212529;
            --card-bg: #ffffff;
            --border: #dee2e6;
            --hover-bg: #f8f9fa;
            --breadcrumb-text: #6c757d;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            --icon-folder: #dcb44a;
            --icon-file: #6c757d;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0d1117;
                --text: #c9d1d9;
                --card-bg: #161b22;
                --border: #30363d;
                --hover-bg: #1c2128;
                --breadcrumb-text: #8b949e;
                --shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
                --icon-folder: #e2b84a;
                --icon-file: #8b949e;
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .container-main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 16px 60px;
        }
        .header {
            padding: 24px 0 16px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0;
            color: var(--text);
        }
        .breadcrumb-nav {
            background: transparent;
            padding: 8px 0;
            margin-bottom: 16px;
            font-size: 0.95rem;
        }
        .breadcrumb-nav a {
            color: #58a6ff;
            text-decoration: none;
        }
        .breadcrumb-nav a:hover {
            text-decoration: underline;
        }
        .breadcrumb-nav .separator {
            margin: 0 6px;
            color: var(--breadcrumb-text);
        }
        .breadcrumb-nav .current {
            color: var(--breadcrumb-text);
            font-weight: 500;
        }
        .card-listing {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .table-files {
            width: 100%;
            margin: 0;
            border-collapse: collapse;
        }
        .table-files th {
            padding: 12px 16px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--breadcrumb-text);
            background: var(--hover-bg);
            border-bottom: 1px solid var(--border);
            user-select: none;
            cursor: pointer;
        }
        .table-files th:hover { color: #58a6ff; }
        .table-files td {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        .table-files tr:last-child td { border-bottom: none; }
        .table-files tbody tr:hover {
            background: var(--hover-bg);
        }
        .table-files .file-link {
            color: #58a6ff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .table-files .file-link:hover { text-decoration: underline; }
        .icon-cell { width: 40px; text-align: center; font-size: 1.3rem; }
        .icon-folder-color { color: var(--icon-folder); }
        .icon-file-color { color: var(--icon-file); }
        .file-size {
            text-align: right;
            color: var(--breadcrumb-text);
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .last-modified {
            color: var(--breadcrumb-text);
            font-size: 0.9rem;
            white-space: nowrap;
        }
        @media (max-width: 768px) {
            .last-modified, .file-size { font-size: 0.8rem; }
            .header h1 { font-size: 1.3rem; }
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--breadcrumb-text);
        }
        .spinner-grow-sm {
            width: 1.2rem;
            height: 1.2rem;
            display: inline-block;
            vertical-align: -0.125em;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--breadcrumb-text);
        }
        .empty-state i { font-size: 3rem; display: block; margin-bottom: 12px; }
        .error-state {
            text-align: center;
            padding: 80px 20px;
        }
        .error-state .error-code {
            font-size: 5rem;
            font-weight: 700;
            color: var(--breadcrumb-text);
            line-height: 1;
        }
        .error-state .error-msg {
            font-size: 1.25rem;
            color: var(--breadcrumb-text);
            margin-top: 12px;
        }
        .markdown-body {
            padding: 20px 24px;
            font-size: 1rem;
            line-height: 1.7;
        }
        .markdown-body img { max-width: 100%; border-radius: 6px; }
        .markdown-body pre {
            background: var(--hover-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            overflow-x: auto;
        }
        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
        }
        .markdown-body table th,
        .markdown-body table td {
            padding: 8px 12px;
            border: 1px solid var(--border);
        }
        .footer {
            text-align: center;
            padding: 20px;
            color: var(--breadcrumb-text);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
            margin-top: 40px;
        }
        .footer a {
            color: #58a6ff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container-main">
        <div class="header">
            <h1><i class="bi bi-cloud-fill" style="color: #58a6ff;"></i> boring_student</h1>
        </div>
        <nav class="breadcrumb-nav" id="breadcrumb"></nav>
        <div class="card-listing">
            <div id="content-area">
                <div class="loading">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">加载中...</span>
                    </div>
                    <p class="mt-3">正在加载...</p>
                </div>
            </div>
        </div>
        <div class="footer">
            Powered by <a href="https://github.com/{repo_owner}/{repo_name}" target="_blank">GitHub</a>
        </div>
    </div>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" media="(prefers-color-scheme: dark)">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <script>
    (function() {
        const OWNER = '{repo_owner}';
        const REPO = '{repo_name}';
        const BRANCH = '{default_branch}';
        const CONTENT_AREA = document.getElementById('content-area');
        const BREADCRUMB = document.getElementById('breadcrumb');
        let currentPath = '';

        function getRepoPath() {
            let p = decodeURIComponent(window.location.pathname);
            // Remove leading slash
            if (p.startsWith('/')) p = p.substring(1);
            // Remove trailing slash
            if (p.endsWith('/')) p = p.substring(0, p.length - 1);
            // Remove repo name if present (GitHub Pages adds it as prefix)
            // For custom domain, the path IS the path we need
            if (p && p.split('/')[0] === REPO) {
                return p.substring(REPO.length + 1);
            }
            return p;
        }

        function getDisplayPath() {
            return getRepoPath();
        }

        function buildApiPath(repoPath) {
            if (repoPath) {
                return 'https://api.github.com/repos/' + OWNER + '/' + REPO + '/contents/' + repoPath + '?ref=' + BRANCH;
            }
            return 'https://api.github.com/repos/' + OWNER + '/' + REPO + '/contents/?ref=' + BRANCH;
        }

        function isBinaryFile(name) {
            const binaryExts = [
                '.zip','.tar','.gz','.bz2','.xz','.7z','.rar',
                '.png','.jpg','.jpeg','.gif','.bmp','.ico','.webp','.svg',
                '.mp3','.mp4','.avi','.mkv','.mov','.flv','.wmv',
                '.exe','.dll','.so','.dylib','.bin',
                '.pdf','.doc','.docx','.xls','.xlsx','.ppt','.pptx',
                '.ttf','.woff','.woff2','.eot','.otf',
                '.iso','.img','.dmg',
            ];
            const nameLower = name.toLowerCase();
            return binaryExts.some(ext => nameLower.endsWith(ext));
        }

        function isMarkdownFile(name) {
            return name.toLowerCase().endsWith('.md');
        }

        function isTextFile(name) {
            const textExts = [
                '.txt','.log','.csv','.json','.xml','.yaml','.yml',
                '.html','.htm','.css','.js','.ts','.jsx','.tsx',
                '.py','.java','.c','.cpp','.h','.hpp','.go','.rs',
                '.sh','.bat','.ps1','.rb','.php','.sql','.toml','.ini','.cfg',
                '.md','.markdown',
            ];
            const nameLower = name.toLowerCase();
            return textExts.some(ext => nameLower.endsWith(ext));
        }

        function getFileIconClass(name, isDir) {
            if (isDir) return 'bi-folder-fill icon-folder-color';
            const ext = name.substring(name.lastIndexOf('.')).toLowerCase();
            const iconMap = {
                '.md': 'bi-filetype-md',
                '.txt': 'bi-filetype-txt',
                '.json': 'bi-filetype-json',
                '.yml': 'bi-filetype-yml',
                '.yaml': 'bi-filetype-yml',
                '.html': 'bi-filetype-html',
                '.css': 'bi-filetype-css',
                '.js': 'bi-filetype-js',
                '.py': 'bi-filetype-py',
                '.java': 'bi-filetype-java',
                '.sql': 'bi-filetype-sql',
                '.zip': 'bi-file-zip-fill',
                '.pdf': 'bi-filetype-pdf',
                '.png': 'bi-file-image-fill',
                '.jpg': 'bi-file-image-fill',
                '.jpeg': 'bi-file-image-fill',
                '.gif': 'bi-file-image-fill',
                '.svg': 'bi-file-image-fill',
                '.mp4': 'bi-file-play-fill',
                '.mp3': 'bi-file-music-fill',
            };
            return (iconMap[ext] || 'bi-file-earmark-fill') + ' icon-file-color';
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            if (!bytes || bytes < 0) return '-';
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            const k = 1024;
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            const size = (bytes / Math.pow(k, i)).toFixed(i === 0 ? 0 : 1);
            return size + ' ' + units[i];
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            try {
                const d = new Date(dateStr);
                return d.toLocaleDateString('zh-CN', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                });
            } catch { return '-'; }
        }

        function buildBreadcrumb(relPath) {
            if (!relPath) {
                BREADCRUMB.innerHTML = '<span class="current"><i class="bi bi-house-door-fill"></i> 首页</span>';
                return;
            }
            const parts = relPath.split('/');
            let html = '<a href="#/" onclick="router.navigate(\'\');return false;"><i class="bi bi-house-door-fill"></i> 首页</a>';
            let cumPath = '';
            parts.forEach((part, i) => {
                if (!part) return;
                cumPath += (cumPath ? '/' : '') + part;
                html += ' <span class="separator">/</span> ';
                if (i < parts.length - 1) {
                    html += '<a href="#/' + cumPath + '" onclick="router.navigate(\'' + cumPath + '\');return false;">' + escapeHtml(part) + '</a>';
                } else {
                    html += '<span class="current">' + escapeHtml(part) + '</span>';
                }
            });
            BREADCRUMB.innerHTML = html;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        function renderDirectory(data, relPath) {
            buildBreadcrumb(relPath);
            const items = data.filter(item => {
                const name = item.name;
                return !name.startsWith('.');
            });
            // Sort: directories first, then files, alphabetically
            items.sort((a, b) => {
                if (a.type === 'dir' && b.type !== 'dir') return -1;
                if (a.type !== 'dir' && b.type === 'dir') return 1;
                return a.name.localeCompare(b.name, 'zh-Hans-CN', { sensitivity: 'base' });
            });

            if (items.length === 0) {
                CONTENT_AREA.innerHTML = '<div class="empty-state"><i class="bi bi-folder2-open"></i><p>此目录为空</p></div>';
                return;
            }

            let html = '<table class="table-files">';
            html += '<thead><tr><th class="icon-cell">&nbsp;</th><th>名称</th><th class="file-size">大小</th><th class="last-modified">修改时间</th></tr></thead>';
            html += '<tbody>';
            items.forEach(item => {
                const isDir = item.type === 'dir';
                const iconClass = getFileIconClass(item.name, isDir);
                const childRelPath = relPath ? relPath + '/' + item.name : item.name;
                const href = isDir
                    ? ('#/' + childRelPath)
                    : (isBinaryFile(item.name) ? item.html_url : ('#/' + childRelPath));
                const target = isDir ? '' : ' target="_blank"';
                const attr = isDir
                    ? (' onclick="router.navigate(\'' + escapeAttr(childRelPath) + '\');return false;"')
                    : '';
                html += '<tr>';
                html += '<td class="icon-cell"><i class="bi ' + iconClass + '"></i></td>';
                html += '<td><a class="file-link" href="' + href + '"' + target + attr + '>' + escapeHtml(item.name) + '</a></td>';
                html += '<td class="file-size">' + (isDir ? '-' : formatSize(item.size)) + '</td>';
                html += '<td class="last-modified">' + formatDate(null) + '</td>';
            });
            html += '</tbody></table>';
            CONTENT_AREA.innerHTML = html;
        }

        function escapeAttr(str) {
            return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function show404() {
            document.title = '404 - 文件未找到 | boring_student';
            BREADCRUMB.innerHTML = '';
            CONTENT_AREA.innerHTML =
                '<div class="error-state">' +
                '<div class="error-code">404</div>' +
                '<div class="error-msg">文件或目录不存在</div>' +
                '<p class="mt-3" style="color:var(--breadcrumb-text);">你访问的路径可能已被移动或删除。</p>' +
                '<a class="btn btn-primary mt-2" href="/" onclick="router.navigate(\'\');return false;">返回首页</a>' +
                '</div>';
        }

        function showError(msg) {
            CONTENT_AREA.innerHTML =
                '<div class="error-state">' +
                '<div class="error-code"><i class="bi bi-exclamation-triangle-fill" style="color:#f0ad4e;"></i></div>' +
                '<div class="error-msg">' + escapeHtml(msg) + '</div>' +
                '<a class="btn btn-primary mt-3" href="/" onclick="router.navigate(\'\');return false;">返回首页</a>' +
                '</div>';
        }

        async function loadPath(relPath) {
            currentPath = relPath;
            const displayPath = relPath || '';
            document.title = (displayPath ? displayPath.split('/').pop() : '首页') + ' | boring_student';
            CONTENT_AREA.innerHTML =
                '<div class="loading"><div class="spinner-border text-primary" role="status"><span class="visually-hidden">加载中...</span></div><p class="mt-3">正在加载...</p></div>';

            const apiUrl = buildApiPath(displayPath);

            try {
                const resp = await fetch(apiUrl, {
                    headers: { 'Accept': 'application/vnd.github.v3+json' },
                });

                if (!resp.ok) {
                    if (resp.status === 404 || resp.status === 403) {
                        show404();
                    } else {
                        showError('API 请求失败: ' + resp.status);
                    }
                    return;
                }

                const data = await resp.json();

                if (Array.isArray(data)) {
                    // It's a directory
                    renderDirectory(data, displayPath);
                } else {
                    // It's a single file
                    await renderFile(data, displayPath);
                }
            } catch (err) {
                console.error('加载失败:', err);
                showError('网络请求失败，请检查网络连接后重试。');
            }
        }

        async function renderFile(fileData, relPath) {
            const name = fileData.name;
            if (isBinaryFile(name)) {
                // Redirect to raw download
                window.location.href = fileData.download_url || fileData.html_url;
                return;
            }

            if (isMarkdownFile(name)) {
                // Fetch and render markdown
                try {
                    const resp = await fetch(fileData.download_url);
                    const mdText = await resp.text();
                    const html = marked.parse(mdText);
                    document.title = name + ' | boring_student';
                    buildBreadcrumb(relPath);
                    CONTENT_AREA.innerHTML = '<div class="markdown-body">' + html + '</div>';
                    // Highlight code blocks
                    if (typeof hljs !== 'undefined') {
                        document.querySelectorAll('.markdown-body pre code').forEach(block => {
                            hljs.highlightElement(block);
                        });
                    }
                } catch {
                    showError('无法加载文件内容。');
                }
            } else if (isTextFile(name)) {
                // Fetch and render code/text
                try {
                    const resp = await fetch(fileData.download_url);
                    const text = await resp.text();
                    document.title = name + ' | boring_student';
                    buildBreadcrumb(relPath);
                    CONTENT_AREA.innerHTML =
                        '<pre style="padding:20px;margin:0;overflow-x:auto;background:var(--hover-bg);border-radius:0;font-size:0.9rem;line-height:1.5;"><code>' +
                        escapeHtml(text) +
                        '</code></pre>';
                } catch {
                    showError('无法加载文件内容。');
                }
            } else {
                // Unknown file type - redirect to download
                window.location.href = fileData.download_url || fileData.html_url;
            }
        }

        // --- Router ---
        const router = {
            navigate: function(path) {
                if (path.startsWith('/')) path = path.substring(1);
                if (path.endsWith('/')) path = path.substring(0, path.length - 1);
                window.history.pushState({ path: path }, '', '/' + path);
                loadPath(path);
            },
            init: function() {
                window.addEventListener('popstate', function(e) {
                    const p = e.state && e.state.path !== undefined ? e.state.path : getRepoPath();
                    loadPath(p);
                });
                // Initial load
                const p = getRepoPath();
                window.history.replaceState({ path: p }, '', '/' + p);
                loadPath(p);
            }
        };

        // Expose router globally for onclick handlers
        window.router = router;

        // Start the app
        router.init();
    })();
    </script>
</body>
</html>
