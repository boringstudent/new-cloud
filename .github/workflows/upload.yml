name: Upload File via Workflow

on:
  workflow_dispatch:
    inputs:
      file_path:
        description: '目标文件路径'
        required: true
      file_content_base64:
        description: '文件内容（Base64编码）'
        required: true
      commit_message:
        description: '提交信息'
        required: true
        default: '上传文件'

permissions:
  contents: write
  actions: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode and write file
        run: |
          mkdir -p "$(dirname "${{ github.event.inputs.file_path }}")"
          echo "${{ github.event.inputs.file_content_base64 }}" | base64 -d > "${{ github.event.inputs.file_path }}"

      - name: Git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push
        run: |
          git add "${{ github.event.inputs.file_path }}"
          git commit -m "${{ github.event.inputs.commit_message }}"
          git push