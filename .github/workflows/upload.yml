name: Upload File to Repository

on:
  workflow_dispatch:
    inputs:
      file_path:
        description: '目标文件路径（相对于仓库根目录）'
        required: true
        type: string
      file_content:
        description: '文件内容（Base64编码）'
        required: true
        type: string
      commit_message:
        description: '提交信息'
        required: false
        type: string
        default: 'Upload file via GitHub Actions'

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Decode and write file
      run: |
        mkdir -p $(dirname "${{ github.event.inputs.file_path }}")
        echo "${{ github.event.inputs.file_content }}" | base64 -d > "${{ github.event.inputs.file_path }}"

    - name: Commit and push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add "${{ github.event.inputs.file_path }}"
        git commit -m "${{ github.event.inputs.commit_message }}"
        git push origin HEAD