name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]  # 在推送到主分支时触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许工作流向 gh-pages 分支写入
      pages: write     # 允许部署 Pages
      id-token: write  # 允许 OIDC 认证

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract storage directory name
      id: extract-dir
      run: echo "STORAGE_DIR=$(echo ${{ secrets.REPO_NAME }} | cut -d'/' -f2)" >> $GITHUB_OUTPUT

    - name: Checkout storage repository
      uses: actions/checkout@v4
      with:
        repository: ${{ secrets.REPO_NAME }}
        path: ${{ steps.extract-dir.outputs.STORAGE_DIR }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8.x'  # 使用最新的 Python 3 版本

    - name: Install dependencies
      run: pip install markdown

    - name: Run build script
      run: python build.py
      env:
        APIKEY: ${{ secrets.APIKEY }}
        ADMIN: ${{ secrets.ADMIN }}
        REPO_NAME: ${{ secrets.REPO_NAME }}

    # 配置Pages环境
    - name: Configure Pages
      uses: actions/configure-pages@v4

    # 直接上传构建产物（不使用run_id）
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./build

    # 部署到GitHub Pages
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      timeout-minutes: 3